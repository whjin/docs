<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewer</title>
    <link rel="icon" href="../images/favicon.ico" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/font-awesome.min.css" />
    <link rel="stylesheet" href="../css/github-dark.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="markdown-content" class="markdown-content"></div>
    <script src="../js/marked.min.js"></script>
    <script src="../js/highlight.min.js"></script>
    <script src="../js/marked-highlight.min.js"></script>
    <script src="../js/util.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', (e) => {
        const title = decodeURIComponent(window.location.search.slice(1));
        document.title = '吴华锦 - ' + title;
        loadMarkdown('markdown-content', `posts/${title}.md`);
      });
    </script>
  </body>
</html>
