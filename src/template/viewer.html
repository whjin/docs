<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewer</title>
    <link rel="icon" href="../images/favicon.ico" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/font-awesome.min.css" />
    <link rel="stylesheet" href="../css/github-dark.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main id="markdown-content" class="markdown-content viewer"></main>
    <script src="../components/loading/index.js"></script>
    <script src="../js/marked.min.js"></script>
    <script src="../js/highlight.min.js"></script>
    <script src="../js/marked-highlight.min.js"></script>
    <script src="../js/util.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', (e) => {
        let query = window.location.search.slice(1);
        let idx = query.indexOf('_');
        let dir = query.slice(0, idx);
        let title = decodeURIComponent(query.slice(idx + 1));
        document.title = `${title.toUpperCase()} \u00AB 吴华锦`;

        const filePath = `posts/${dir}/${title}.md`;
        loadMarkdown('markdown-content', filePath);
      });
    </script>
  </body>
</html>
