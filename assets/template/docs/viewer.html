<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewer</title>
  </head>
  <body>
    <div id="markdown-viewer"></div>
    <script src="../../js/marked.umd.min.js"></script>
    <script src="../../js/util.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', (e) => {
        const title = decodeURIComponent(window.location.search.slice(1));
        document.title = title;
        loadMarkdown('markdown-viewer', `/assets/template/docs/${title}.md`);
      });
    </script>
  </body>
</html>
